  <path d="M120 470c60-36 128-10 116 34" stroke="#c9973f" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 9"/>
  <circle cx="120" cy="470" r="14" fill="#c9973f"/>
  <circle cx="120" cy="470" r="6" fill="#f0e6d2"/>

  <!-- hammer -->
  <g transform="translate(508 468) rotate(28)">
    <rect x="-6" y="-8" width="12" height="86" rx="5" fill="#8a6a3f"/>
    <rect x="-30" y="-30" width="60" height="26" rx="8" fill="#3a2a1c"/>
  </g>

  <!-- ground -->
  <rect x="64" y="520" width="512" height="10" rx="5" fill="#241a12" opacity="0.85"/>
