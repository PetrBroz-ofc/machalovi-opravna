    <path d="M244 396h204" stroke="#e8d09a" stroke-width="3" stroke-dasharray="8 7" stroke-linecap="round"/>
    <path d="M348 214v122" stroke="#7c4520" stroke-width="3" stroke-dasharray="8 7" stroke-linecap="round"/>
  </g>

